<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Báo Thức Online</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background: linear-gradient(135deg, #2c3e50, #bdc3c7);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #333;
        }
        .clock-container {
            background: #fff;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            text-align: center;
            width: 350px;
        }
        h2 {
            margin-bottom: 20px;
            color: #2c3e50;
            text-transform: uppercase;
            font-size: 1.5rem;
        }
        .current-time {
            font-size: 2.5rem;
            font-weight: bold;
            color: #e74c3c;
            margin-bottom: 25px;
            letter-spacing: 2px;
        }
        .inputs {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }
        select {
            padding: 10px;
            font-size: 1rem;
            border-radius: 5px;
            border: 1px solid #ccc;
            width: 30%;
            cursor: pointer;
            outline: none;
        }
        select:focus {
            border-color: #3498db;
        }
        button {
            width: 100%;
            padding: 12px;
            font-size: 1rem;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
        }
        .btn-set {
            background-color: #2ecc71;
            color: white;
        }
        .btn-set:hover {
            background-color: #27ae60;
        }
        .btn-clear {
            background-color: #e74c3c;
            color: white;
            margin-top: 10px;
            display: none;
        }
        .btn-clear:hover {
            background-color: #c0392b;
        }
        .status {
            margin-top: 15px;
            font-size: 0.95rem;
            font-weight: 500;
            color: #7f8c8d;
        }
    </style>
</head>
<body>
    <div class="clock-container">
        <h2>Báo Thức Của Bạn</h2> 
        <div class="current-time" id="currentTime">00:00:00 PM</div>
        <div class="inputs" id="alarmInputs">
            <select id="hours">
                <option value="Hour" selected hidden>Giờ</option>
            </select>
            <select id="minutes">
                <option value="Minute" selected hidden>Phút</option>
            </select>
            <select id="ampm">
                <option value="AM/PM" selected hidden>AM/PM</option>
                <option value="AM">AM</option>
                <option value="PM">PM</option>
            </select>
        </div>
        <button class="btn-set" id="setAlarmBtn">Đặt Báo Thức</button>
        <button class="btn-clear" id="clearAlarmBtn">Tắt Báo Thức</button>
        <div class="status" id="alarmStatus">Chưa đặt báo thức</div>
    </div>
    <audio id="alarmSound" loop>
        <source src="https://actions.google.com/sounds/v1/alarms/digital_watch_alarm_long.ogg" type="audio/ogg">
        <source src="https://www.soundjay.com/buttons/beep-06.mp3" type="audio/mp3">
    </audio>
    <script>
        const currentTimeTime = document.getElementById("currentTime");
        const hourSelect = document.getElementById("hours");
        const minuteSelect = document.getElementById("minutes");
        const ampmSelect = document.getElementById("ampm");
        const setAlarmBtn = document.getElementById("setAlarmBtn");
        const clearAlarmBtn = document.getElementById("clearAlarmBtn");
        const alarmStatus = document.getElementById("alarmStatus");
        const alarmSound = document.getElementById("alarmSound");
        let alarmTime = null;
